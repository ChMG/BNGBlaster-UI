services:
  bngblaster-ui:
    # Development overlay: bind-mount source and enable Gunicorn reload
    command:
      - gunicorn
      - --reload
      - -w
      - "1"
      - -c
      - gunicorn.conf.py
      - server:app
    environment:
      GUNICORN_WORKERS: "1"
      GUNICORN_THREADS: "1"
      GUNICORN_LOGLEVEL: debug
    volumes:
      - ./:/app
