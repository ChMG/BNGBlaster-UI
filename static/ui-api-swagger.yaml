openapi: 3.0.3
info:
  title: BNG Blaster UI API
  version: 1.0.0
  description: >-
    Internal UI API for template management, backend metadata, and persisted
    instance start options.
servers:
  - url: /
tags:
  - name: templates
  - name: backend
  - name: start-options
  - name: auth

paths:
  /ui-api/templates:
    get:
      tags: [templates]
      summary: List saved templates
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateListItem'

  /ui-api/templates/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema:
          type: string
        description: Template name (a-z, A-Z, 0-9, _, -)
    get:
      tags: [templates]
      summary: Get template JSON
      responses:
        '200':
          description: Template content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
    put:
      tags: [templates]
      summary: Create or update template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkObject'
        '400':
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
    delete:
      tags: [templates]
      summary: Delete template
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkObject'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'

  /ui-api/backend-info:
    get:
      tags: [backend]
      summary: Get active backend configuration
      responses:
        '200':
          description: Backend metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendInfo'

  /ui-api/auth/status:
    get:
      tags: [auth]
      summary: Get OIDC authentication status and auth URLs
      responses:
        '200':
          description: Authentication status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'

  /ui-api/auth/login:
    get:
      tags: [auth]
      summary: Start OIDC login flow
      description: >-
        Starts the OIDC authorization redirect flow. Optional query parameters:
        `next` for post-login target path and `prompt` (for example `login`)
        to force fresh IdP authentication.
      parameters:
        - in: query
          name: next
          required: false
          schema:
            type: string
          description: Relative path to return to after successful login.
        - in: query
          name: prompt
          required: false
          schema:
            type: string
          description: Optional OIDC prompt value passed to the IdP.
      responses:
        '302':
          description: Redirect to OIDC provider authorization endpoint
        '404':
          description: OIDC not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
        '500':
          description: OIDC client not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'

  /ui-api/auth/callback:
    get:
      tags: [auth]
      summary: OIDC callback endpoint
      description: >-
        Completes OIDC login, validates configured group/role allowlists, then
        redirects back to the requested page.
      responses:
        '302':
          description: Successful authentication and redirect to UI target page
        '401':
          description: OIDC callback failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
        '403':
          description: Authenticated user is not allowed by configured groups/roles
          content:
            text/html:
              schema:
                type: string
        '404':
          description: OIDC not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
        '500':
          description: OIDC client not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'

  /ui-api/auth/logout:
    get:
      tags: [auth]
      summary: Logout current OIDC session
      description: >-
        Clears local session and redirects to IdP logout endpoint (if available)
        or to configured post-logout redirect URI.
      responses:
        '302':
          description: Redirect after logout

  /ui-api/instance-start-options/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema:
          type: string
        description: Instance name
      - in: header
        name: X-Bngblaster-Target
        required: false
        schema:
          type: string
        description: >-
          Selected backend target URL (or numeric index) used to namespace
          stored data in multi-backend mode.
    get:
      tags: [start-options]
      summary: Get saved start options for an instance
      responses:
        '200':
          description: Start options object (or empty object)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartOptions'
    put:
      tags: [start-options]
      summary: Save start options for an instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartOptions'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkObject'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
    delete:
      tags: [start-options]
      summary: Delete saved start options for an instance
      responses:
        '200':
          description: Deleted (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkObject'

  /ui-api/instance-start-options/_cleanup:
    post:
      tags: [start-options]
      summary: Trigger manual orphan cleanup
      description: >-
        Runs one cleanup pass and removes saved entries for instances that no
        longer exist on reachable backend targets.
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanupResult'

  /ui-api/instances/{name}/reconfigure:
    put:
      tags: [start-options]
      summary: Stop, apply config, and restart instance
      description: >-
        Stops the instance if running, applies the provided config via backend
        PUT, then starts it again using saved start options for the selected
        backend target (or empty object if none are stored).
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: Instance name
        - in: header
          name: X-Bngblaster-Target
          required: false
          schema:
            type: string
          description: Selected backend target URL (or numeric index).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Reconfigure completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  used_start_options:
                    $ref: '#/components/schemas/StartOptions'
                required: [ok, used_start_options]
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
        '502':
          description: Backend unreachable or status unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'
        '504':
          description: Timeout waiting for stop/start transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject'

components:
  schemas:
    TemplateListItem:
      type: object
      properties:
        name:
          type: string
        preview:
          type: string
      required: [name, preview]

    BackendInfo:
      type: object
      properties:
        app_version:
          type: string
        app_version_check_enabled:
          type: boolean
        app_version_status:
          $ref: '#/components/schemas/AppVersionStatusEntry'
        backend_url:
          type: string
        backend_urls:
          type: array
          items:
            type: string
        multi_backend:
          type: boolean
        metric_grafana_url:
          type: string
        version_check_enabled:
          type: boolean
        oidc_enabled:
          type: boolean
        oidc_authenticated:
          type: boolean
        oidc_groups_claim:
          type: string
        oidc_allowed_groups:
          type: array
          items:
            type: string
        oidc_roles_claim:
          type: string
        oidc_allowed_roles:
          type: array
          items:
            type: string
        oidc_user:
          $ref: '#/components/schemas/OidcUser'
        version_status:
          type: object
          properties:
            controller:
              $ref: '#/components/schemas/VersionStatusEntry'
            blaster:
              $ref: '#/components/schemas/VersionStatusEntry'
      required: [app_version, app_version_check_enabled, backend_url, backend_urls, multi_backend, version_check_enabled]

    AuthStatus:
      type: object
      properties:
        enabled:
          type: boolean
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/OidcUser'
        groups_claim:
          type: string
        allowed_groups:
          type: array
          items:
            type: string
        roles_claim:
          type: string
        allowed_roles:
          type: array
          items:
            type: string
        login_url:
          type: string
        logout_url:
          type: string
      required: [enabled, authenticated, user, groups_claim, allowed_groups, roles_claim, allowed_roles, login_url, logout_url]

    OidcUser:
      type: object
      additionalProperties: true
      properties:
        sub:
          type: string
          nullable: true
        name:
          type: string
        email:
          type: string
        preferred_username:
          type: string
        groups:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string

    AppVersionStatusEntry:
      type: object
      properties:
        current:
          type: string
          nullable: true
        latest:
          type: string
          nullable: true
        up_to_date:
          type: boolean
          nullable: true
        source_url:
          type: string
      required: [source_url]

    VersionStatusEntry:
      type: object
      properties:
        current:
          type: string
          nullable: true
        latest:
          type: string
          nullable: true
        up_to_date:
          type: boolean
          nullable: true
        release_url:
          type: string
      required: [release_url]

    StartOptions:
      type: object
      additionalProperties: false
      properties:
        logging:
          type: boolean
        logging_flags:
          type: array
          items:
            type: string
        metric_flags:
          type: array
          items:
            type: string
        report:
          type: boolean
        report_flags:
          type: array
          items:
            type: string
        pcap:
          type: boolean
        session_count:
          type: integer
          minimum: 1

    OkObject:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    CleanupResult:
      type: object
      properties:
        ok:
          type: boolean
        removed:
          type: integer
          minimum: 0
      required: [ok, removed]

    ErrorObject:
      type: object
      properties:
        error:
          type: string
      required: [error]
