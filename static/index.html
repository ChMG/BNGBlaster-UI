<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BNG Blaster Console</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Local DaisyUI + Tailwind utilities bundle -->
    <link href="/vendor/daisyui-full.min.css" rel="stylesheet" />
    <script src="/vendor/tailwindcss-cdn.js?v=2"></script>

    <!-- Local vendor importmap -->
    <script type="importmap">
    {
      "imports": {
        "vue":        "/vendor/vue.esm-browser.prod.js",
        "vue-router": "/vendor/vue-router.esm-browser.prod.js",
        "js-yaml":    "/vendor/js-yaml.mjs"
      }
    }
    </script>

    <style>
      :root {
        --color-brand: #e20074;
        --color-brand-soft: rgba(226, 0, 116, 0.1);
        --color-bg: #f3f5f7;
        --color-surface: #ffffff;
        --color-surface-alt: #f8f9fb;
        --color-border: #d8dde3;
        --color-text: #1e2a36;
        --color-muted: #5f6b76;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--color-text);
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
      }

      /* Generic brand tokens */
      :root { --brand: var(--color-brand); --brand-dim: var(--color-brand-soft); }

      .brand-border   { border-color: var(--brand) !important; }
      .brand-text     { color: var(--brand); }
      .brand-bg       { background: var(--brand-dim); }
      .brand-ring     { outline: 2px solid rgba(40,212,172,0.4); }
      .page-bg        { background: var(--color-bg); }
      .brand-button-text { color: #ffffff; }
      .border-brand-soft { border-color: rgba(226, 0, 116, 0.32) !important; }
      .border-brand-strong { border-color: rgba(226, 0, 116, 0.62) !important; }
      .text-11 { font-size: 11px; line-height: 1rem; }
      .text-10 { font-size: 10px; line-height: 0.875rem; }
      .h-screen-fit { height: calc(100vh - 0px); }
      .max-h-40vh { max-height: 40vh; }

      .bg-base-200,
      .modal-box,
      .card,
      .table,
      .textarea,
      .input,
      .select {
        background: var(--color-surface) !important;
      }

      .bg-base-300 {
        background: var(--color-surface-alt) !important;
      }

      .border-base-300,
      .table :where(th, td),
      .divider,
      .menu :where(li:not(.menu-title)>*:not(ul):not(.menu-title):not(details):not(.btn)) {
        border-color: var(--color-border) !important;
      }

      .text-base-content,
      .table,
      .label-text,
      .btn {
        color: var(--color-text) !important;
      }

      .text-base-content\/40,
      .text-base-content\/50,
      .text-base-content\/60,
      .text-base-content\/70 {
        color: var(--color-muted) !important;
      }

      .btn {
        border-radius: 8px;
        border: 1px solid var(--color-border);
        box-shadow: none;
        font-weight: 600;
      }

      .btn:hover {
        border-color: #b8c0c8;
        background: #f5f7f9;
      }

      .btn-success,
      .btn-warning,
      .btn-error,
      .btn-primary,
      .brand-button-text {
        background: var(--color-brand) !important;
        border-color: var(--color-brand) !important;
        color: #fff !important;
      }

      .btn-success:hover,
      .btn-warning:hover,
      .btn-error:hover,
      .btn-primary:hover,
      .brand-button-text:hover {
        background: #bf0063 !important;
        border-color: #bf0063 !important;
      }

      .badge {
        border-radius: 999px;
        border: 1px solid var(--color-border);
        background: var(--color-surface-alt);
      }

      .badge-success,
      .badge-warning,
      .badge-error {
        background: var(--color-brand-soft) !important;
        color: #8f0049 !important;
        border-color: rgba(226, 0, 116, 0.35) !important;
      }

      .table th {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-muted);
        background: var(--color-surface-alt);
      }

      .stable-table {
        table-layout: fixed;
      }

      .stable-table :where(th, td) {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stable-wrap {
        white-space: normal !important;
      }

      .sessions-table tbody tr {
        height: 36px;
      }

      .sessions-table tbody td {
        padding-top: 0.35rem;
        padding-bottom: 0.35rem;
      }

      .nav-active {
        background: var(--color-brand-soft);
        color: var(--color-brand);
        border-left: 3px solid var(--color-brand);
      }

      .nav-item {
        border-left: 3px solid transparent;
      }

      .alert-success,
      .alert-error {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        color: var(--color-text);
      }

      /* Scrollbar */
      ::-webkit-scrollbar        { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track  { background: transparent; }
      ::-webkit-scrollbar-thumb  { background: rgba(31, 45, 58, 0.2); border-radius: 3px; }

      /* JSON editor */
      .json-editor {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.8rem;
        resize: vertical;
        min-height: 180px;
      }
    </style>
  </head>
  <body class="page-bg text-base-content min-h-screen">
    <div id="app"></div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
